[tools]
# Standard tools
1password-cli = "2.32.1"
actionlint = "1.7.12"
aws-sam-cli = "1.162.1"
awscli = "2.35.13"                         # requires rosetta 2
bat = "0.26.1"
bun = "1.3.14"
delta = "0.19.2"
duckdb = "1.5.4"
eza = "0.23.4"
fzf = "0.73.1"                             # required for zoxide interactive (cdi)
gitu = "0.42.0"
go = "1.26.4"
jq = "1.8.2"
jujutsu = "0.42.0"
node = "lts"
pandoc = "3.10"
pre-commit = "4.6.0"
python = "3.12.13"
ripgrep = "15.1.0"
rust = "1.96.1"
shellcheck = "0.11.0"
starship = "1.26.0"
terraform = "1.15.7"
uv = "0.11.26"
yarn = "4.17.0"
zoxide = "0.9.9"

# aqua: tools
"aqua:99designs/aws-vault" = "7.2.0"       # mise registry maps to incorrect aqua:ByteNess/aws-vault
"aqua:anthropics/claude-code" = "2.1.199"
"aqua:cli/cli" = "2.95.0"                  # gh: bare registry entry not tracked by Renovate
"aqua:ducaale/xh" = "0.26.1"
"aqua:google-antigravity/antigravity-cli" = "1.0.15"
"aqua:google/osv-scanner" = "2.4.0"
"aqua:j178/prek" = "0.4.5"
"aqua:suzuki-shunsuke/ghalint" = "1.5.6"
"aqua:suzuki-shunsuke/pinact" = "4.1.0"
"aqua:sxyazi/yazi" = "26.5.6"
"aqua:zizmorcore/zizmor" = "1.26.1"

# cargo: tools
"cargo:treemd" = "0.5.6"

# github: tools
"github:rysk-tanaka/csvr" = "0.2.0"
# Apple Intelligence backend for auto-commit/suggest-branch; release ships arm64 macOS only,
# so gate with os to keep `mise install` working on Intel macOS / Linux clones
"github:rysk-tanaka/rintel" = { version = "0.2.0", os = ["macos/arm64"] }

# ubi: tools
# global wakatime-cli stops claude-code-wakatime's unauthenticated GitHub API version polling
"ubi:wakatime/wakatime-cli" = "2.21.4"

# npm: tools
"npm:aws-cdk" = "2.1128.1"
"npm:cc-sdd" = "2.1.1"
"npm:ccmanager" = "3.12.6"
"npm:ccusage" = "18.0.11"                     # 18.0.6 has runtime: protocol dep (incompatible with npm/bun global install)
"npm:@ccusage/codex" = "18.0.11"              # 18.0.6 has runtime: protocol dep (incompatible with npm/bun global install)
"npm:claude-code-templates" = "1.29.2"
"npm:@github/copilot" = "0.0.423"
"npm:markdownlint-cli2" = "0.22.1"
"npm:md-mermaid-lint" = "1.0.1"
"npm:opencommit" = "3.3.7"
"npm:pnpm" = "11.9.0"                         # npm backend: aqua registry lacks v11 darwin tarball asset
"npm:pyright" = "1.1.411"

[env]
DOTFILES_PATH = "/Users/rysk/Repositories/rysk/dotfiles"

[tasks.lint]
# Global tasks default to config_root ($HOME) as cwd; without this, running
# `mise run lint` with no paths would ruff-format the entire home directory
dir = "{{cwd}}"
usage = 'arg "[paths]" var=#true help="Lint target paths"'
run = [
  "uv run --with ruff -- ruff format ${usage_paths:-}",
  "uv run --with ruff -- ruff check ${usage_paths:-}",
  "uv run --with mypy -- mypy ${usage_paths:-.}",
  "uv run --with ty -- ty check ${usage_paths:-}",
  "uv run --with pyright -- pyright ${usage_paths:-}",
]

[settings]

[settings.npm]
package_manager = "bun"
