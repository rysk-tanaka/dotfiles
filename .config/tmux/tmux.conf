# Enable true color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Increase scrollback buffer
set -g history-limit 50000

# Enable mouse support
set -g mouse on

# Start window/pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows on close
set -g renumber-windows on

# Reduce escape delay (important for vim)
set -sg escape-time 10

# Enable focus events (for vim autoread)
set -g focus-events on

# Status bar - Ayu Dark theme
set -g status-style "bg=#0d1017,fg=#565b66"
set -g status-left ""
set -g status-right "#[fg=#e6b450]#S #[fg=#565b66]%Y-%m-%d %H:%M"
set -g status-right-length 40
setw -g window-status-format "#[fg=#565b66] #W "
setw -g window-status-current-format "#[fg=#e6b450] #W "
