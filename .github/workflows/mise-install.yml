name: mise install

on:
  pull_request:

jobs:
  mise-install:
    runs-on: macos-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read

    steps:
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: changes
        with:
          filters: |
            config:
              - '.config/mise/config.toml'

      - name: Checkout repository
        if: steps.changes.outputs.config == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup mise
        if: steps.changes.outputs.config == 'true'
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true

      # mise reads .config/mise/config.toml relative to the working
      # directory (repo root after checkout), not ~/.config/mise/.
      - name: Verify tool installation
        if: steps.changes.outputs.config == 'true'
        env:
          MISE_HTTP_TIMEOUT: 120
        run: mise install
