name: mise install

on:
  pull_request:

jobs:
  mise-install:
    runs-on: macos-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read

    steps:
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        id: changes
        with:
          filters: |
            config:
              - '.config/mise/config.toml'

      - name: Checkout repository
        if: steps.changes.outputs.config == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup mise
        if: steps.changes.outputs.config == 'true'
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3
        with:
          cache: true

      # mise reads .config/mise/config.toml relative to the working
      # directory (repo root after checkout), not ~/.config/mise/.
      - name: Verify tool installation
        if: steps.changes.outputs.config == 'true'
        env:
          MISE_HTTP_TIMEOUT: 120
        run: mise install
