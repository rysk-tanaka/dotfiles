name: mise install

on:
  pull_request:

jobs:
  mise-install:
    runs-on: macos-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read

    steps:
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: changes
        with:
          filters: |
            config:
              - '.config/mise/config.toml'

      - name: Checkout repository
        if: steps.changes.outputs.config == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup mise
        if: steps.changes.outputs.config == 'true'
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3
        with:
          cache: true

      # mise reads .config/mise/config.toml relative to the working
      # directory (repo root after checkout), not ~/.config/mise/.
      - name: Verify tool installation
        if: steps.changes.outputs.config == 'true'
        env:
          MISE_HTTP_TIMEOUT: 120
        run: mise install
